<!DOCTYPE html>
<html lang="en">

<head>
  <title>Internshala Job Alert App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .container-box {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-weight: bold;
    }

    p {
      font-size: 1.1rem;
    }

    .btn {
      margin: 10px;
      padding: 10px 30px;
      font-size: 1rem;
    }
  </style>
</head>

<body>
  <div class="container-box">
    <h1>Internshala Job Alert</h1>
    <p class="mt-3">
      Tired of searching for internships every day?<br>
      Our app automatically finds the latest internships on Internshala based on your preferences,
      and emails you a personalized job list every 48 hours.
    </p>
    <div class="mt-4">
      <a href="{{ url_for('register') }}" class="btn btn-light">Register</a>
      <a href="{{ url_for('login') }}" class="btn btn-outline-light">Login</a>
    </div>
  </div>
</body>

</html>
